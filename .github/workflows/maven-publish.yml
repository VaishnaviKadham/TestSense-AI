name: Run Selenium TestNG Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # ✅ FIXED: Chrome setup (NO manual driver)
    - name: Setup Chrome (Stable + Compatible)
      uses: browser-actions/setup-chrome@v1

    - name: Verify Chrome
      run: google-chrome --version

    - name: Ensure Required Folders Exist
      run: |
        mkdir -p reports screenshots logs

    - name: Run TestNG Suite in Headless Mode
      run: |
        mvn clean test \
        -Dsurefire.suiteXmlFiles=testng.xml \
        -DexecutionMode=headless
      continue-on-error: true

    # CREATE UNIQUE FOLDER PER RUN
    - name: Prepare Unique Test Results Folder
      if: always()
      run: |
        RUN_ID=${{ github.run_id }}
        FOLDER="test-results/run-$RUN_ID"

        mkdir -p $FOLDER

        cp -r target/surefire-reports $FOLDER/ || true
        cp -r screenshots $FOLDER/ || true
        cp -r logs $FOLDER/ || true

        echo "RESULT_FOLDER=$FOLDER" >> $GITHUB_ENV

    # COMMIT TO REPO
    - name: Commit Test Results
      if: always()
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add test-results/
        git commit -m "Add test results for run ${{ github.run_id }} [skip ci]" || echo "No changes"
        git push

    # OPTIONAL ARTIFACTS
    - name: Upload Combined Test Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts
        path: |
          target/surefire-reports/
          screenshots/
          logs/
