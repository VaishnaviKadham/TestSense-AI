name: Run Selenium TestNG Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Install Chrome
      run: |
        sudo apt update
        sudo apt install -y google-chrome-stable

    - name: Install ChromeDriver
      run: |
        CHROME_VERSION=$(google-chrome --version | awk '{print $3}')
        wget https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION/linux64/chromedriver-linux64.zip
        unzip chromedriver-linux64.zip
        sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
        chmod +x /usr/local/bin/chromedriver

    - name: Ensure Required Folders Exist
      run: |
        mkdir -p reports screenshots logs

    - name: Run TestNG Suite in Headless Mode
      run: |
        mvn clean test \
        -Dsurefire.suiteXmlFiles=testng.xml \
        -DexecutionMode=headless
      continue-on-error: true

    # EXISTING (optional, keep if you want separate downloads)
    - name: Upload Extent Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Extent-Report
        path: reports/

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Screenshots
        path: screenshots/

    - name: Upload TestNG Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TestNG-Reports
        path: target/surefire-reports/

    - name: Upload Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Logs
        path: logs/

    #IMPORTANT: ADD THIS (for AI pipeline)
    - name: Upload Combined Test Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts   # MUST MATCH AI WORKFLOW
        path: |
          target/surefire-reports/
          screenshots/
          logs/
