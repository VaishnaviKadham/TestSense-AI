name: AI Failure Analysis Pipeline

on:
  workflow_run:
    workflows: ["Run Selenium TestNG Tests"]
    types:
      - completed

jobs:
  ai-analysis:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r ai_pipeline/requirements.txt

      #  Install jq (needed for parsing JSON)
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      #  DOWNLOAD ARTIFACTS (FIXED - API METHOD)
      - name: Download Test Artifacts via GitHub API
        run: |
          echo "Fetching artifacts from previous workflow..."

          RUN_ID=${{ github.event.workflow_run.id }}
          REPO=${{ github.repository }}

          echo "Run ID: $RUN_ID"
          echo "Repo: $REPO"

          # Get artifacts list
          curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github+json" \
               https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/artifacts \
               -o artifacts.json

          echo "Artifacts list:"
          cat artifacts.json

          # Extract download URL
          URL=$(jq -r '.artifacts[] | select(.name=="test-artifacts") | .archive_download_url' artifacts.json)

          if [ -z "$URL" ] || [ "$URL" == "null" ]; then
            echo " ERROR: test-artifacts not found"
            exit 1
          fi

          echo "Downloading artifact from: $URL"

          # Download artifact zip
          curl -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               -o artifacts.zip "$URL"

          # Unzip
          unzip artifacts.zip -d .

          echo "Artifacts downloaded and extracted"

      # Debug (optional but useful)
      - name: List Downloaded Files
        run: |
          echo "Listing extracted files:"
          ls -R

      #  Run AI Pipeline
      - name: Run AI Analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
        run: |
          python ai_pipeline/main.py

      #  Optional: Upload AI Results
      - name: Upload AI Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-analysis-results
          path: |
            reports/
            logs/
