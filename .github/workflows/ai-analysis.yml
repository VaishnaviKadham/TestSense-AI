name: AI Failure Analysis Pipeline

on:
  push:
    paths:
      - 'test-results/**'
  workflow_dispatch:

jobs:
  ai-analysis:
    runs-on: ubuntu-latest

    steps:

      # ─────────────────────────────
      # Checkout
      # ─────────────────────────────
      - name: Checkout Repo
        uses: actions/checkout@v4

      # ─────────────────────────────
      # Python Setup
      # ─────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ─────────────────────────────
      # Install Dependencies
      # ─────────────────────────────
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r ai_pipeline/requirements.txt

      # ─────────────────────────────
      # Restore history (safe for first run)
      # ─────────────────────────────
      - name: Restore history
        uses: actions/download-artifact@v4
        with:
          name: flakiness-history
          path: ai_pipeline/
        continue-on-error: true

      # ─────────────────────────────
      # Ensure history.json exists (FIRST RUN FIX)
      # ─────────────────────────────
      - name: Ensure history file exists
        run: |
          mkdir -p ai_pipeline
          if [ ! -f ai_pipeline/history.json ]; then
            echo "{}" > ai_pipeline/history.json
            echo "Created new history.json"
          else
            echo "history.json already exists"
          fi

      # ─────────────────────────────
      # Get latest test-results folder
      # ─────────────────────────────
      - name: Get Latest Test Results Folder
        run: |
          if ls test-results/run-* 1> /dev/null 2>&1; then
            LATEST=$(ls -td test-results/run-* | head -1)
          else
            LATEST="test-results"
          fi
          echo "LATEST_FOLDER=$LATEST" >> $GITHUB_ENV
          echo "Using folder: $LATEST"

      # ─────────────────────────────
      # Run AI Pipeline
      # ─────────────────────────────
      - name: Run AI Analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          RESULTS_PATH: ${{ env.LATEST_FOLDER }}
        run: |
          python ai_pipeline/main.py

      # ─────────────────────────────
      # Upload history (ALWAYS)
      # ─────────────────────────────
      - name: Save history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flakiness-history
          path: ai_pipeline/history.json
          retention-days: 30
