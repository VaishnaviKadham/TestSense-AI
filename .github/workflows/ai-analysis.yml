name: AI Failure Analysis Pipeline

on:
  workflow_run:
    workflows: ["Run Selenium TestNG Tests"]
    types:
      - completed

jobs:
  ai-analysis:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r ai_pipeline/requirements.txt

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Download Artifacts from Previous Workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
          https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts \
          > artifacts.json

          DOWNLOAD_URL=$(cat artifacts.json | jq -r '.artifacts[] | select(.name=="test-artifacts") | .archive_download_url')

          if [ "$DOWNLOAD_URL" == "null" ]; then
            echo "Artifact not found!"
            exit 1
          fi

          curl -L -H "Authorization: Bearer $GH_TOKEN" \
          -o artifacts.zip "$DOWNLOAD_URL"

          unzip artifacts.zip

      - name: Run AI Analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
        run: python ai_pipeline/main.py
