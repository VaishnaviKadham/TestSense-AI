name: AI Failure Analysis Pipeline

on:
  push:
    paths:
      - 'test-results/**'
  workflow_dispatch:

jobs:
  ai-analysis:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r ai_pipeline/requirements.txt

      # Restore history BEFORE running pipeline
      - name: Restore history
        uses: actions/download-artifact@v4
        with:
          name: flakiness-history
          path: ai_pipeline/
        continue-on-error: true
      - name: Check history exists
        run: |
         if [ -f ai_pipeline/history.json ]; then
          echo "History restored"
         else
          echo "No previous history found, starting fresh"
          fi

      # FIND LATEST RUN FOLDER
      - name: Get Latest Test Results Folder
        id: latest
        run: |
          LATEST=$(ls -td test-results/run-* | head -1)
          echo "LATEST_FOLDER=$LATEST" >> $GITHUB_ENV
          echo "Using folder: $LATEST"

      # RUN AI PIPELINE
      - name: Run AI Analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          RESULTS_PATH: ${{ env.LATEST_FOLDER }}
        run: |
          python ai_pipeline/main.py

      #  Save history AFTER pipeline
      - name: Save history
        uses: actions/upload-artifact@v4
        with:
          name: flakiness-history
          path: ai_pipeline/history.json
